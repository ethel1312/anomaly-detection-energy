<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ENSA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <img src="/static/img/login.png" alt="Ilustración de login">
        </div>
        <div class="login-right">
            <div class="login-form">
                <img src="/static/img/logo.png" alt="Logo ENSA" class="logo">
                <h2>Iniciar sesión</h2>

                <form id="loginForm">
                    <label for="email">Correo</label>
                    <input type="email" id="email" name="email" required>

                    <label for="password">Contraseña</label>
                    <div class="password-container">
                        <input type="password" id="password" name="password" required>
                        <span class="toggle-password" onclick="togglePassword()"><i class="fa-solid fa-eye"></i></span>
                    </div>

                    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

                    <button type="submit">Iniciar sesión</button>
                </form>

            </div>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
